<body>
  <div id="root">

      <button class="collapse-button">Collapse</button>

      </div>
    </div>

    <div class="form-container">
      <div class="form-button"></div>

        <label for="form-text">Напишите нам</label>
        <span class='close'>X</span>
        <textarea name="form-text" id="form-text"></textarea>

    </div>

    <button class="like-container">Like</button>
